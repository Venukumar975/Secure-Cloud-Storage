<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCS | Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav><a href="/">HOME</a> <a href="/upload">UPLOAD</a> <a href="/search">SEARCH</a></nav>
    <div class="container">
        <h2>Local Encryption & Push</h2>
        <div class="progress-container">
            <div id="pCircle" class="progress-circle" data-progress="0"></div>
        </div>
        <input type="file" id="fileInput"><br>
        <button onclick="uploadFile()">Encrypt & Upload to S3</button>
        <p id="status" style="margin-top: 20px;"></p>
    </div>

    <script>
        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) return alert("Select a file!");

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload', true);

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    const circle = document.getElementById('pCircle');
                    circle.style.background = `conic-gradient(#00f2fe ${percent}%, #333 ${percent}%)`;
                    circle.setAttribute('data-progress', percent);
                }
            };

            xhr.onload = function() {
                const res = JSON.parse(xhr.responseText);
                document.getElementById('status').innerText = res.message || res.error;
            };

            xhr.send(formData);
        }
    </script>
</body>
</html>
